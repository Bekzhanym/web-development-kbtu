<section class="product-list">
  <h1 class="product-list__title">Каталог товаров Kaspi.kz</h1>
  @if (products().length === 0) {
    <p class="product-list__empty">В этой категории нет товаров.</p>
  } @else {
    <div class="product-list__grid">
      @for (product of products(); track product.id) {
        <app-product-card
          [product]="product"
          (deleteProduct)="onDelete($event)"
        />
      }
    </div>
  }
</section>
